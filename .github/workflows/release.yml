name: Build and Release Yuuki Engine

on:
  push:
    tags:
      - 'v*'

jobs:
  # Windows (x64) - uses MinGW on Windows runner
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile for Windows
        run: |
          g++ -std=c++17 -O3 -static -pthread -Iinclude src/*.cpp -o yuuki.exe
      - uses: actions/upload-artifact@v4
        with:
          name: yuuki-windows
          path: yuuki.exe

  # Linux (x64)
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile for Linux
        run: |
          g++ -std=c++17 -O3 -pthread -Iinclude src/*.cpp -o yuuki
      - uses: actions/upload-artifact@v4
        with:
          name: yuuki-linux
          path: yuuki

  # macOS (x64)
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile for macOS
        run: |
          g++ -std=c++17 -O3 -pthread -Iinclude src/*.cpp -o yuuki
      - uses: actions/upload-artifact@v4
        with:
          name: yuuki-macos
          path: yuuki

  # Android (arm64-v8a) - using NDK directly
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip
          echo "NDK=$PWD/android-ndk-r26c" >> $GITHUB_ENV
      - name: Compile for Android arm64-v8a
        run: |
          $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
            -std=c++17 -O3 -static-libstdc++ -pthread -Iinclude src/*.cpp -o yuuki-android
      - uses: actions/upload-artifact@v4
        with:
          name: yuuki-android
          path: yuuki-android

  # Create the GitHub Release and attach all binaries
  create-release:
    needs: [build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
      - name: Organize binaries
        run: |
          mkdir release
          cp binaries/yuuki-windows/yuuki.exe release/yuuki-win-x64.exe
          cp binaries/yuuki-linux/yuuki release/yuuki-linux-x64
          cp binaries/yuuki-macos/yuuki release/yuuki-macos-x64
          cp binaries/yuuki-android/yuuki-android release/yuuki-android-arm64-v8a
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
